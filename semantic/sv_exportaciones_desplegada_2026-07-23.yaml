module_custom_instructions:
  sql_generation: |
    Reglas obligatorias: (1) Filtrar siempre WK_MES > 0. (2) La métrica de valor por defecto es SUM(VLR_USD_EXPORTACION_FOB) en dólares FOB; nunca mezclar monedas ni inventar deflactores. (3) El año se calcula como FLOOR(WK_MES/100); no unir con dimensiones de fecha de grano diario. (4) Para departamento usar WK_DEPARTAMENTO_ORIGEN y para transporte WK_MEDIO_TRANSPORTE, salvo que el usuario pida explícitamente "procedencia" o "logística". (5) Las variables "estrella" de DIM_CUENTA_SL describen a la EMPRESA (no a la operación); no usarlas para agrupar operaciones salvo petición explícita. (6) Si piden "no minero" filtrar DIM_ARANCEL_SL.TIPO = 'NO MINERAS'; "minero" es TIPO = 'MINERAS'. (7) Ante ambigüedad de periodo, usar el último año calendario completo disponible y decirlo.