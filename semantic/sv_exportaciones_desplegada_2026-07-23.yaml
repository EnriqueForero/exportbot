      - left_column: WK_PAIS_RECEPTOR
        right_column: WK_PAIS
    join_type: left_outer
verified_queries:
  - name: TOTAL_FOB_POR_MES
    sql: SELECT WK_MES AS PERIODO, SUM(VLR_USD_EXPORTACION_FOB) AS TOTAL_USD_FOB FROM DWH_PROCOLOMBIA_SNOWFLAKE.SILVER.FACT_EXPORTACIONES_SL WHERE WK_MES > 0 GROUP BY WK_MES ORDER BY WK_MES DESC
    question: ¿Cuál es el total exportado en USD FOB por mes?
    verified_at: 1784445133
    verified_by: GIC ProColombia
    use_as_onboarding_question: false
  - name: TOTAL_FOB_POR_ANIO
    sql: SELECT FLOOR(WK_MES/100) AS ANIO, SUM(VLR_USD_EXPORTACION_FOB) AS TOTAL_USD_FOB FROM DWH_PROCOLOMBIA_SNOWFLAKE.SILVER.FACT_EXPORTACIONES_SL WHERE WK_MES > 0 GROUP BY 1 ORDER BY 1 DESC
    question: ¿Cuánto exportó Colombia en dólares FOB por año?
    verified_at: 1784445133
    verified_by: GIC ProColombia
    use_as_onboarding_question: false
  - name: TOP_PAISES_2025
    sql: SELECT p.DESC_PAIS AS PAIS_DESTINO, SUM(f.VLR_USD_EXPORTACION_FOB) AS TOTAL_USD_FOB FROM DWH_PROCOLOMBIA_SNOWFLAKE.SILVER.FACT_EXPORTACIONES_SL f LEFT JOIN DWH_PROCOLOMBIA_SNOWFLAKE.SILVER.DIM_PAIS_SL p ON f.WK_PAIS_RECEPTOR = p.WK_PAIS WHERE f.WK_MES > 0 AND FLOOR(f.WK_MES/100) = 2025 GROUP BY 1 ORDER BY 2 DESC LIMIT 10
    question: ¿Cuáles fueron los 10 principales países destino por valor exportado en 2025?
    verified_at: 1784445133
    verified_by: GIC ProColombia
    use_as_onboarding_question: false
  - name: FOB_POR_DEPARTAMENTO_ORIGEN
    sql: |-
      SELECT d.DEPARTAMENTO AS DEPARTAMENTO_ORIGEN, SUM(f.VLR_USD_EXPORTACION_FOB) AS TOTAL_USD_FOB FROM DWH_PROCOLOMBIA_SNOWFLAKE.SILVER.FACT_EXPORTACIONES_SL f LEFT JOIN DWH_PROCOLOMBIA_SNOWFLAKE.SILVER.DIM_DEPARTAMENTO_SL d
        ON f.WK_DEPARTAMENTO_ORIGEN = d.WK_DEPARTAMENTO
      WHERE f.WK_MES > 0 AND FLOOR(f.WK_MES/100) = 2024 GROUP BY 1 ORDER BY 2 DESC
    question: ¿Cuánto exportó cada departamento de origen en 2024?
    verified_at: 1784445133
    verified_by: GIC ProColombia
    use_as_onboarding_question: false
  - name: FOB_POR_SECTOR
    sql: SELECT s.DESC_SECTOR AS SECTOR, SUM(f.VLR_USD_EXPORTACION_FOB) AS TOTAL_USD_FOB FROM DWH_PROCOLOMBIA_SNOWFLAKE.SILVER.FACT_EXPORTACIONES_SL f LEFT JOIN DWH_PROCOLOMBIA_SNOWFLAKE.SILVER.DIM_ARANCEL_SL a ON f.WK_POSICION = a.WK_POSICION LEFT JOIN DWH_PROCOLOMBIA_SNOWFLAKE.SILVER.DIM_SECTOR_SL s ON a.WK_SECTOR = s.WK_SECTOR WHERE f.WK_MES > 0 AND FLOOR(f.WK_MES/100) = 2025 GROUP BY 1 ORDER BY 2 DESC LIMIT 20
    question: ¿Cuáles fueron los sectores con mayor valor exportado en 2025?
    verified_at: 1784445133
    verified_by: GIC ProColombia
