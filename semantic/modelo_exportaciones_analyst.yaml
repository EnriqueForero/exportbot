  - name: top_empresas_antioquia_2025
    question: ¿Cuáles fueron las 5 empresas que más exportaron desde Antioquia en 2025?
    sql: >-
      SELECT c.RAZON_SOCIAL AS EXPORTADOR, c.NUMERO_IDENTIFICACION AS NIT,
             SUM(f.VLR_USD_EXPORTACION_FOB) AS TOTAL_USD_FOB
      FROM DWH_PROCOLOMBIA_SNOWFLAKE.SILVER.FACT_EXPORTACIONES_SL f
      LEFT JOIN DWH_PROCOLOMBIA_SNOWFLAKE.SILVER.DIM_DEPARTAMENTO_SL d
        ON f.WK_DEPARTAMENTO_ORIGEN = d.WK_DEPARTAMENTO
      LEFT JOIN DWH_PROCOLOMBIA_SNOWFLAKE.SILVER.DIM_CUENTA_SL c
        ON f.WK_CUENTA_EXPORTADOR = c.WK_CUENTA
      WHERE f.WK_MES > 0 AND FLOOR(f.WK_MES/100) = 2025 AND d.DEPARTAMENTO = 'Antioquia'
      GROUP BY 1, 2 ORDER BY 3 DESC LIMIT 5
