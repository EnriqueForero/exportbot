repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        exclude: ^notebooks/
  - repo: local
    hooks:
      - id: exportbot-regression-contract
        name: ExportBot regression contract
        entry: python -m pytest backend/tests/test_regression_contract.py backend/tests/test_notebook_contracts.py -q --no-header
        language: system
        pass_filenames: false
        stages: [pre-push]
